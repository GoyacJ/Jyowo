[package]
name = "jyowo-desktop-shell"
version.workspace = true
description = "Jyowo desktop shell"
authors = ["Jyowo"]
license.workspace = true
repository = ""
edition.workspace = true
rust-version.workspace = true

[lib]
name = "jyowo_desktop_shell"
crate-type = ["staticlib", "cdylib", "rlib"]
doctest = false

[build-dependencies]
tauri-build = { workspace = true, features = [] }

[dependencies]
blake3 = { workspace = true }
jyowo-harness-sdk = { path = "../../../crates/jyowo-harness-sdk", default-features = false, features = ["stream-permission", "jsonl-store", "local-sandbox", "mcp-stdio", "memory-external-slot", "provider-anthropic", "provider-codex", "provider-deepseek", "provider-doubao", "provider-gemini", "provider-local-llama", "provider-minimax", "provider-openai", "provider-openrouter", "provider-qwen", "provider-zhipu", "observability-redactor"] }
keyring = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tauri = { workspace = true, features = [] }
tauri-plugin-store = { workspace = true }
tokio = { workspace = true }

[dev-dependencies]
async-trait = { workspace = true }
futures = { workspace = true }
jyowo-harness-sdk = { path = "../../../crates/jyowo-harness-sdk", default-features = false, features = ["stream-permission", "jsonl-store", "local-sandbox", "mcp-stdio", "memory-external-slot", "provider-anthropic", "provider-codex", "provider-deepseek", "provider-doubao", "provider-gemini", "provider-local-llama", "provider-minimax", "provider-openai", "provider-openrouter", "provider-qwen", "provider-zhipu", "observability-redactor", "testing"] }
serde_json = { workspace = true }
thiserror = { workspace = true }

[lints]
workspace = true
